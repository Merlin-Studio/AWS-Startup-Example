# VPCs, subnets, Transit Gateway, VPC endpoints, Network Firewall.
# Schema: https://awslabs.github.io/landing-zone-accelerator-on-aws/v1.14/typedocs/

defaultVpc:
  delete: true
  excludeAccounts: []

vpcs:
  - name: main
    # Per-VPC account from vpc_subnet_plan (hub -> Network, spokes -> workload acct).
    account: Workload
    region: us-east-2
    cidrs:
      - 10.0.0.0/16
    enableDnsHostnames: true
    enableDnsSupport: true
    instanceTenancy: default
    internetGateway: true
    vpcFlowLogs:
      trafficType: ALL
      maxAggregationInterval: 600
      destinations:
        - cloud-watch-logs
        - s3
      destinationsConfig:
        cloudWatchLogs:
          retentionInDays: 365
        s3:
          lifecycleRules:
            # VPC flow logs are high-volume operational telemetry — a 1y default
            # avoids a 7y S3 cost drag (the compliance audit archive keeps its
            # own multi-year retention); set s3_retention_days to override.
            - enabled: true
              expiration: 365
              noncurrentVersionExpiration: 90
              abortIncompleteMultipartUpload: 7
      defaultFormat: false
      customFields:
        - version
        - account-id
        - interface-id
        - srcaddr
        - dstaddr
        - srcport
        - dstport
        - protocol
        - packets
        - bytes
        - start
        - end
        - action
        - log-status
        - vpc-id
        - subnet-id
        - instance-id
        - tcp-flags
        - type
        - pkt-srcaddr
        - pkt-dstaddr
    # Standalone VPC route tables: public subnets egress via the internet
    # gateway, private subnets via the VPC NAT gateway (same-AZ when available).
    # Without these, LZA's network-config-validator rejects the subnets'
    # routeTable references and the VPC would have no egress route.
    routeTables:
      - name: main-public-a-rt
        routes:
          - name: default-to-igw
            destination: 0.0.0.0/0
            type: internetGateway
      - name: main-public-b-rt
        routes:
          - name: default-to-igw
            destination: 0.0.0.0/0
            type: internetGateway
      - name: main-private-a-rt
        routes:
          - name: default-to-nat
            destination: 0.0.0.0/0
            type: natGateway
            target: nat-a
      - name: main-private-b-rt
        routes:
          - name: default-to-nat
            destination: 0.0.0.0/0
            type: natGateway
            target: nat-a
    subnets:
      - name: main-public-a
        availabilityZone: us-east-2a
        ipv4CidrBlock: 10.0.0.0/24
        routeTable: main-public-a-rt
        mapPublicIpOnLaunch: true
      - name: main-public-b
        availabilityZone: us-east-2b
        ipv4CidrBlock: 10.0.1.0/24
        routeTable: main-public-b-rt
        mapPublicIpOnLaunch: true
      - name: main-private-a
        availabilityZone: us-east-2a
        ipv4CidrBlock: 10.0.10.0/24
        routeTable: main-private-a-rt
        mapPublicIpOnLaunch: false
      - name: main-private-b
        availabilityZone: us-east-2b
        ipv4CidrBlock: 10.0.11.0/24
        routeTable: main-private-b-rt
        mapPublicIpOnLaunch: false
    natGateways:
      - name: nat-a
        subnet: main-public-a
    gatewayEndpoints:
      defaultPolicy: Default
      endpoints:
        - service: s3
        - service: dynamodb

transitGateways:
  []





centralNetworkServices:

dhcpOptions:
  []

endpointPolicies:
  - name: Default
    document: vpc-endpoint-policies/default.json