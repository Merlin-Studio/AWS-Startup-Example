# Centralised security services: GuardDuty, Security Hub, Config, Macie,
# Access Analyzer, IAM password policies, AWS Config rules.
# Schema: https://awslabs.github.io/landing-zone-accelerator-on-aws/v1.14/typedocs/

centralSecurityServices:
  delegatedAdminAccount: Audit

  ebsDefaultVolumeEncryption:
    enable: true
    excludeRegions: []

  s3PublicAccessBlock:
    enable: true
    excludeAccounts: []

  scpRevertChangesConfig:
    enable: true

  snsSubscriptions:
    - level: High
      email: "security@example.com"
    - level: Medium
      email: "security@example.com"
    - level: Low
      email: "security@example.com"

  macie:
    enable: false
    excludeRegions: []
    policyFindingsPublishingFrequency: FIFTEEN_MINUTES
    publishSensitiveDataFindings: true
    lifecycleRules:
      - enabled: true
        expiration: 365
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  guardduty:
    enable: true
    excludeRegions: []
    s3Protection:
      enable: true
      excludeRegions: []
    eksProtection:
      enable: false
      excludeRegions: []
    # GuardDuty Malware Protection (LZA v1.14 ec2Protection):
    # forensic scanning of EBS volumes on workloads flagged in findings.
    # HIPAA §164.308(a)(6)(ii) for PHI workloads. keepSnapshots retains
    # snapshots of infected volumes as forensic evidence.
    ec2Protection:
      enable: false
      keepSnapshots: true
      excludeRegions: []
    # RDS Protection — on for regulated frameworks or when RDS/Aurora is in use
    # (bank transactional data concentrates there); gated by the GuardDuty SoT.
    rdsProtection:
      enable: false
      excludeRegions: []
    autoEnableOrgMembers: true
    exportConfiguration:
      enable: true
      destinationType: S3
      exportFrequency: FIFTEEN_MINUTES
    lifecycleRules:
      - enabled: true
        expiration: 365
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  auditManager:
    enable: false
    excludeRegions: []
    defaultReportsConfiguration:
      enable: true
      destinationType: S3
    lifecycleRules:
      - enabled: true
        expiration: 2555
        noncurrentVersionExpiration: 90
        abortIncompleteMultipartUpload: 7

  detective:
    enable: false
    excludeRegions: []

  securityHub:
    enable: true
    regionAggregation: true
    excludeRegions: []
    standards:
      - name: aws-foundational-security-best-practices/v/1.0.0
        enable: true
        controlsToDisable: []
      - name: cis-aws-foundations-benchmark/v/1.4.0
        enable: true
        controlsToDisable: []

  ssmAutomation:
    excludeRegions: []
    documentSets:
      - shareTargets:
          organizationalUnits:
            - Root
        documents:
          - name: Attach-IAM-Instance-Profile
            template: ssm-documents/attach-iam-instance-profile.yaml
          - name: Attach-IAM-Role-Policy
            template: ssm-documents/attach-iam-role-policy.yaml

accessAnalyzers:
  enable: true

iamPasswordPolicy:
  allowUsersToChangePassword: true
  hardExpiry: false
  requireUppercaseCharacters: true
  requireLowercaseCharacters: true
  requireSymbols: true
  requireNumbers: true
  minimumPasswordLength: 14
  passwordReusePrevention: 24
  maxPasswordAge: 90

awsConfig:
  enableConfigurationRecorder: true
  enableDeliveryChannel: true
  overrideExisting: false
  aggregation:
    enable: true
    delegatedAdminAccount: Audit
  ruleSets:
    - deploymentTargets:
        organizationalUnits:
          - Root
      rules:
        # CIS baseline rules
        - name: iam-password-policy
          identifier: IAM_PASSWORD_POLICY
        - name: iam-user-mfa-enabled
          identifier: IAM_USER_MFA_ENABLED
        - name: cloudtrail-enabled
          identifier: CLOUD_TRAIL_ENABLED
        - name: s3-bucket-public-read-prohibited
          identifier: S3_BUCKET_PUBLIC_READ_PROHIBITED
        - name: s3-bucket-public-write-prohibited
          identifier: S3_BUCKET_PUBLIC_WRITE_PROHIBITED
        - name: vpc-flow-logs-enabled
          identifier: VPC_FLOW_LOGS_ENABLED
        # IMDSv2 enforcement detection — CIS 5.4 requires IMDSv2 on all EC2.
        - name: ec2-imdsv2-check
          identifier: EC2_IMDSV2_CHECK

keyManagementService:
  keySets:
    # NOTE: a compliance framework set CMK rotation to 90 days, but LZA's
    # keySets schema only exposes enableKeyRotation (boolean) -> AWS-managed annual
    # (365d) rotation. The OpenTofu / tfvars / CDK formats honor the 90-day
    # period via rotation_period_in_days. Under LZA, set the shorter period post-deploy
    # (aws kms enable-key-rotation --rotation-period-in-days 90) or manage these
    # CMKs in Terraform to meet the floor.
    - name: AcceleratorKey
      alias: alias/accelerator/kms/key
      description: LZA-managed default workload CMK (CIS 2.2.1 / CIS 3.7).
      enableKeyRotation: true
      enabled: true
      deploymentTargets:
        organizationalUnits:
          - Root
    - name: CentralLogsKey
      alias: alias/accelerator/kms/central-logs-key
      description: Central log archive CMK (CloudTrail / Config / VPC Flow Logs / S3 SSE-KMS).
      enableKeyRotation: true
      enabled: true
      deploymentTargets:
        organizationalUnits:
          - Root
