# Global Landing Zone Accelerator configuration.
# Schema reference: https://awslabs.github.io/landing-zone-accelerator-on-aws/v1.14/typedocs/

homeRegion: us-east-2
enabledRegions:
  - us-east-2

managementAccountAccessRole: AWSControlTowerExecution
cloudwatchLogRetentionInDays: 365

# Centralised logging configuration
centralizedLoggingRegion: us-east-2

logging:
  account: LogArchive
  cloudtrail:
    enable: true
    organizationTrail: true
    organizationTrailSettings:
      # Feature flags from generators/aws_cloudtrail_features.py so every
      # format ships the same trail config for a given compliance set.
      multiRegionTrail:    true
      globalServiceEvents: true
      managementEvents:    true
      s3DataEvents:        false
      lambdaDataEvents:    false
      sendToCloudWatchLogs: true
      apiErrorRateInsight: false
      apiCallRateInsight:  false
  sessionManager:
    sendToCloudWatchLogs: true
    sendToS3: true
    excludeRegions: []
    excludeAccounts: []
    lifecycleRules:
      - enabled: true
        abortIncompleteMultipartUpload: 7
        expiration: 90
        noncurrentVersionExpiration: 90
  accessLogBucket:
    lifecycleRules:
      - enabled: true
        abortIncompleteMultipartUpload: 7
        expiration: 90
        noncurrentVersionExpiration: 90
  centralLogBucket:
    lifecycleRules:
      - enabled: true
        abortIncompleteMultipartUpload: 7
        expiration: 365  # central-log retention in days (default 2555 = 7y; compliance floors may raise it)
        noncurrentVersionExpiration: 90
    kmsResourcePolicyAttachments:
      - policy: kms/central-logs-key-policy.json
  elbLogBucket:
    lifecycleRules:
      - enabled: true
        abortIncompleteMultipartUpload: 7
        expiration: 365
        noncurrentVersionExpiration: 90

# Reports configuration
reports:
  costAndUsageReport:
    compression: Parquet
    format: Parquet
    reportName: acmecorp-cur
    s3Prefix: cost-and-usage-reports
    timeUnit: DAILY
    refreshClosedReports: true
    reportVersioning: OVERWRITE_REPORT
    lifecycleRules:
      - enabled: true
        abortIncompleteMultipartUpload: 7
        # Cost & Usage Reports are operational data, not the compliance audit
        # archive (centralLogBucket below keeps its multi-year retention) — a 1y
        # default avoids a 7y cost drag; set cur_retention_days to override.
        expiration: 365
        noncurrentVersionExpiration: 90
  budgets:
    - name: org-monthly
      type: COST
      amount: 1000
      unit: USD
      includeUpfront: true
      includeTax: true
      includeSupport: true
      includeRecurring: true
      includeOtherSubscription: true
      includeSubscription: true
      includeDiscount: true
      includeRefund: false
      includeCredit: false
      useAmortized: false
      useBlended: false
      timeUnit: MONTHLY
      notifications:
        - type: ACTUAL
          thresholdType: PERCENTAGE
          threshold: 80
          comparisonOperator: GREATER_THAN
          subscriptionType: EMAIL
          address: "my3mail@acme.com"
        - type: FORECASTED
          thresholdType: PERCENTAGE
          threshold: 100
          comparisonOperator: GREATER_THAN
          subscriptionType: EMAIL
          address: "my3mail@acme.com"
      deploymentTargets:
        organizationalUnits:
          - Root
  # NOTE: Cost Anomaly Detection is requested (anomaly_detection_enabled) and is
  # emitted natively by the OpenTofu / tfvars / CDK formats (aws_ce_anomaly_*),
  # but the Landing Zone Accelerator's reports schema exposes only CUR + budgets.
  # Add it out-of-band post-deploy (or via the Terraform formats side-by-side):
  #   aws ce create-anomaly-monitor --anomaly-monitor '{"MonitorName":"org-monitor","MonitorType":"DIMENSIONAL","MonitorDimension":"SERVICE"}'
  #   aws ce create-anomaly-subscription ...   # threshold 100 USD

# AWS Control Tower integration
controlTower:
  enable: true
  landingZone:
    version: "3.3"
    logging:
      loggingBucketRetentionDays: 90
      accessLoggingBucketRetentionDays: 90
      organizationTrail: true
    security:
      enableIdentityCenterAccess: true

# AWS CDK Toolkit and Pipeline options
cdkOptions:
  centralizeBuckets: true
  useManagementAccessRole: true
  customDeploymentRole: ""
  forceBootstrap: false

# Optional: lockout time after pipeline approval
acceleratorMetadata:
  enable: true
  account: LogArchive
  readOnlyAccessRoleArns: []

